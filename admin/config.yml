backend:
  name: git-gateway
  repo: edeencongo/Edeen-Congo
  branch: main

media_folder: images
public_folder: /images

collections:
    - name: actualites
    label: Actualités
    folder: _actualites
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "Titre", name: "title", widget: "string"}
            - {label: "Date", name: "date", widget: "datetime"}
            - {label: "Image", name: "image", widget: "image"}
            - {label: "Contenu", name: "body", widget: "markdown"}
